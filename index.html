<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduScan PH - Attendance System</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#22315e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="EduScan PH">
  <link rel="apple-touch-icon" href="/icon-192-any.png">
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <style>
    :root {
      --primary: #1d4ed8;
      --primary-light: #3b82f6;
      --primary-bg: #eff6ff;
      --success: #15803d;
      --success-bg: #f0fdf4;
      --success-border: #86efac;
      --danger: #b91c1c;
      --danger-bg: #fef2f2;
      --danger-border: #fca5a5;
      --warning: #92400e;
      --warning-bg: #fffbeb;
      --warning-border: #fcd34d;
      --arrival: #0369a1;
      --arrival-bg: #e0f2fe;
      --arrival-border: #7dd3fc;
      --departure: #7e22ce;
      --departure-bg: #f5f3ff;
      --departure-border: #c4b5fd;
      --bg: #f8fafc;
      --surface: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

    body { background: var(--bg); color: var(--text); display: flex; flex-direction: column; min-height: 100vh; }

    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0.85rem 1rem; text-align: center; }
    header h1 { font-size: 1.2rem; font-weight: 700; color: var(--primary); letter-spacing: -0.02em; }
    header p { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }

    nav { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; position: sticky; top: 0; z-index: 10; }
    .nav-btn { flex: 1; padding: 0.85rem 0.5rem; border: none; background: none; font-weight: 600; font-size: 0.78rem; color: var(--text-muted); cursor: pointer; text-align: center; white-space: nowrap; border-bottom: 3px solid transparent; transition: all 0.2s; }
    .nav-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

    main { flex: 1; padding: 1rem; max-width: 800px; width: 100%; margin: 0 auto; }

    .page { display: none; }
    .page.active { display: block; }

    h2 { margin-bottom: 1rem; font-size: 1.3rem; font-weight: 700; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }

    .form-group { margin-bottom: 0.9rem; }
    label { display: block; margin-bottom: 0.4rem; font-weight: 600; font-size: 0.83rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
    select, input[type="text"], input[type="url"], input[type="date"] {
      width: 100%; padding: 0.65rem 0.75rem; border: 1px solid var(--border);
      border-radius: 8px; font-size: 0.95rem; background: var(--surface); color: var(--text);
      transition: border-color 0.15s;
    }
    select:focus, input:focus { outline: none; border-color: var(--primary-light); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
    textarea { width: 100%; padding: 0.65rem 0.75rem; border: 1px solid var(--border); border-radius: 8px; font-size: 0.85rem; background: var(--bg); color: var(--text); resize: none; font-family: monospace; }

    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; background: var(--primary); color: white; padding: 0.7rem 1.25rem; border: none; border-radius: 8px; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: background 0.15s, transform 0.1s; }
    .btn:hover { background: var(--primary-light); }
    .btn:active { transform: scale(0.98); }
    .btn.full { width: 100%; }
    .btn.danger { background: var(--danger); }
    .btn.danger:hover { background: #dc2626; }
    .btn.success { background: var(--success); }
    .btn.sm { padding: 0.3rem 0.6rem; font-size: 0.78rem; border-radius: 6px; }
    .btn.outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
    .btn.outline:hover { background: var(--primary-bg); }
    label.btn.outline { display: flex; }

    /* ── INSTALL BANNER (scanner page, first-visit) ── */
    #install-banner {
      display: none;
      position: relative;
      border-radius: 12px;
      padding: 0.85rem 1rem;
      margin-bottom: 1rem;
      border: 1.5px solid;
    }
    #install-banner.ios   { background: #eff6ff; border-color: #93c5fd; }
    #install-banner.other { background: var(--primary-bg); border-color: var(--primary-light); }
    #install-banner .ib-title { font-size: 0.88rem; font-weight: 700; margin-bottom: 0.25rem; }
